<!DOCTYPE html>

<html lang="fr" style="background-color:#111213">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#111213">
<title>Le Persille — Admin</title>
<style>html,body{background-color:#111213!important;color:#f0ece4!important;margin:0;padding:0}</style>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{background-color:#111213!important;color:#f0ece4;font-family:'Jost',sans-serif;font-weight:300;min-height:100vh}

header{background-color:#0a0b0c;border-bottom:1px solid rgba(212,112,106,.25);padding:1.2rem 2.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:.75rem}
.logo-box{width:30px;height:30px;border:1.5px solid #d4706a;display:flex;align-items:center;justify-content:center;font-family:‘Cormorant Garamond’,serif;font-size:.8rem;color:#d4706a;-webkit-text-fill-color:#d4706a;background-color:rgba(212,112,106,.13)}
.logo-name{font-family:‘Cormorant Garamond’,serif;font-size:1rem;letter-spacing:.12em;color:#f0ece4;-webkit-text-fill-color:#f0ece4}
.admin-badge{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:#d4706a;-webkit-text-fill-color:#d4706a;border:1px solid rgba(212,112,106,.25);padding:.2rem .6rem;background-color:rgba(212,112,106,.13)}
.back-link{font-size:.65rem;color:#777;-webkit-text-fill-color:#777;text-decoration:none;letter-spacing:.1em}

main{max-width:1100px;margin:0 auto;padding:3rem 2rem}
.page-title{font-family:‘Cormorant Garamond’,serif;font-size:2rem;font-weight:300;margin-bottom:.4rem;color:#f0ece4;-webkit-text-fill-color:#f0ece4}
.page-title em{color:#d4706a;-webkit-text-fill-color:#d4706a;font-style:italic}
.page-sub{font-size:.72rem;color:#777;-webkit-text-fill-color:#777;letter-spacing:.08em;margin-bottom:2.5rem}

/* ADD PRODUCT FORM */
.add-section{background-color:#0a0b0c;border:1px solid rgba(212,112,106,.2);padding:1.8rem;margin-bottom:2.5rem}
.add-title{font-family:‘Cormorant Garamond’,serif;font-size:1.2rem;font-weight:300;color:#f0ece4;-webkit-text-fill-color:#f0ece4;margin-bottom:1.2rem}
.add-title em{color:#d4706a;-webkit-text-fill-color:#d4706a;font-style:italic}
.add-row{display:flex;gap:.8rem;flex-wrap:wrap;align-items:flex-end}
.add-field{display:flex;flex-direction:column;gap:.35rem}
.add-label{font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:#777;-webkit-text-fill-color:#777}
.add-input{background-color:#1a1c1e;border:none;border-bottom:1px solid rgba(212,112,106,.4);color:#f0ece4;-webkit-text-fill-color:#f0ece4;padding:.5rem .6rem;font-size:.8rem;font-family:‘Jost’,sans-serif;outline:none;width:160px}
.add-input.short{width:80px}
.add-select{background-color:#1a1c1e;border:none;border-bottom:1px solid rgba(212,112,106,.4);color:#f0ece4;-webkit-text-fill-color:#f0ece4;padding:.5rem .6rem;font-size:.75rem;font-family:‘Jost’,sans-serif;outline:none;-webkit-appearance:none;appearance:none;width:130px;cursor:pointer}
.add-btn{background-color:#d4706a;color:#111213;-webkit-text-fill-color:#111213;border:none;padding:.55rem 1.5rem;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;font-family:‘Jost’,sans-serif;white-space:nowrap;height:fit-content}

/* TOP BAR */
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
.save-btn{background-color:#d4706a;color:#111213;-webkit-text-fill-color:#111213;border:none;padding:.75rem 2.2rem;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;font-family:‘Jost’,sans-serif}
.status-summary{display:flex;gap:1.2rem;font-size:.65rem;color:#777;-webkit-text-fill-color:#777}
.summary-item{display:flex;align-items:center;gap:.35rem}
.s-dot{width:7px;height:7px;border-radius:50%}
.last-saved{font-size:.62rem;color:#777;-webkit-text-fill-color:#777}
.quick-actions{display:flex;gap:.6rem;margin-bottom:2rem;flex-wrap:wrap}
.quick-btn{background-color:#22252a;border:1px solid rgba(255,255,255,.07);color:#777;-webkit-text-fill-color:#777;padding:.4rem 1rem;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;font-family:‘Jost’,sans-serif}

/* GRID */
.admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5px;background-color:rgba(255,255,255,.07)}
.admin-card{background-color:#22252a;padding:1.4rem;display:flex;align-items:center;gap:1rem}
.admin-icon{font-size:1.4rem;flex-shrink:0;width:36px;text-align:center}
.admin-info{flex:1;min-width:0}
.admin-name{font-family:‘Cormorant Garamond’,serif;font-size:1rem;margin-bottom:.6rem;font-weight:400;color:#f0ece4;-webkit-text-fill-color:#f0ece4}
.admin-controls{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.status-select{flex:1;background-color:#1a1c1e;border:none;border-bottom:1px solid rgba(212,112,106,.4);color:#f0ece4;-webkit-text-fill-color:#f0ece4;padding:.35rem .5rem;font-size:.65rem;font-family:‘Jost’,sans-serif;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;min-width:90px}
.note-input{width:80px;background-color:#1a1c1e;border:none;border-bottom:1px solid rgba(255,255,255,.07);color:#f0ece4;-webkit-text-fill-color:#f0ece4;padding:.35rem .4rem;font-size:.65rem;font-family:‘Jost’,sans-serif;outline:none}
.status-ind{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.delete-btn{background:none;border:none;color:#555;-webkit-text-fill-color:#555;cursor:pointer;font-size:.9rem;padding:.2rem .4rem;flex-shrink:0}
.delete-btn:hover{color:#c0504a;-webkit-text-fill-color:#c0504a}

/* TOAST */
.toast{position:fixed;bottom:2rem;left:50%;-webkit-transform:translateX(-50%) translateY(80px);transform:translateX(-50%) translateY(80px);background-color:#1a1c1e;border:1px solid rgba(212,112,106,.25);padding:.75rem 2rem;font-size:.72rem;color:#d4706a;-webkit-text-fill-color:#d4706a;-webkit-transition:-webkit-transform .4s;transition:transform .4s;z-index:400;pointer-events:none}
.toast.show{-webkit-transform:translateX(-50%) translateY(0);transform:translateX(-50%) translateY(0)}

@media(max-width:700px){
header{padding:1rem 1.2rem}
main{padding:2rem 1rem}
.admin-grid{grid-template-columns:1fr}
.add-row{flex-direction:column}
.add-input,.add-select{width:100%}
}
</style>

</head>
<body>

<div class="toast" id="toast">OK</div>

<header>
  <div class="logo">
    <div class="logo-box">LP</div>
    <span class="logo-name">Le Persille</span>
  </div>
  <div class="admin-badge">Admin</div>
  <a href="index.html" class="back-link">← Voir le site</a>
</header>

<main>
  <h1 class="page-title">Gestion du <em>stock</em></h1>
  <p class="page-sub">Les modifications sont visibles sur le site public apres enregistrement.</p>

  <!-- ADD PRODUCT -->

  <div class="add-section">
    <div class="add-title">Ajouter un <em>produit</em></div>
    <div class="add-row">
      <div class="add-field">
        <span class="add-label">Nom du produit</span>
        <input class="add-input" id="newName" type="text" placeholder="Ex: Entrecote" />
      </div>
      <div class="add-field">
        <span class="add-label">Note</span>
        <input class="add-input short" id="newNote" type="text" placeholder="Bonne quantite" />
      </div>
      <div class="add-field">
        <span class="add-label">Statut</span>
        <select class="add-select" id="newStatus">
          <option value="available">Disponible</option>
          <option value="low">Stock limite</option>
          <option value="out">Epuise</option>
        </select>
      </div>
      <button class="add-btn" onclick="addProduct()">+ Ajouter</button>
    </div>
  </div>

  <!-- ACTIONS -->

  <div class="top-bar">
    <div class="quick-actions">
      <button class="quick-btn" onclick="setAll('available')">Tout disponible</button>
      <button class="quick-btn" onclick="setAll('out')">Tout epuise</button>
    </div>
    <div style="display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap">
      <div class="status-summary" id="summary"></div>
      <span class="last-saved" id="lastSaved"></span>
      <button class="save-btn" onclick="saveStock()">Enregistrer</button>
    </div>
  </div>

  <div class="admin-grid" id="adminGrid"></div>
</main>

<script>
var defaultStock=[
  {id:1,name:"Viande Bovine",icon:"&#x1F969;",status:"available",note:"Bonne quantite"},
  {id:2,name:"Agneau",icon:"&#x1F356;",status:"available",note:"Bonne quantite"},
  {id:3,name:"Poulet Fermier",icon:"&#x1F357;",status:"low",note:"Stock limite"},
  {id:4,name:"Poulet Normal",icon:"&#x1F357;",status:"available",note:"Bonne quantite"},
  {id:5,name:"Merguez",icon:"&#x1F525;",status:"available",note:"Bonne quantite"},
  {id:6,name:"Brochette Poulet",icon:"&#x1F362;",status:"low",note:"Stock limite"},
  {id:7,name:"Boeuf",icon:"&#x1F969;",status:"available",note:"Bonne quantite"},
  {id:8,name:"Cotes Agneau",icon:"&#x1F356;",status:"out",note:"Epuise"},
  {id:9,name:"Kefta",icon:"&#x1F525;",status:"available",note:"Bonne quantite"},
  {id:10,name:"Poulet Marine",icon:"&#x1F32F;",status:"low",note:"Stock limite"}
];

var stock=defaultStock;
var nextId=100;
try{
  var saved=localStorage.getItem('lp_stock2');
  if(saved){stock=JSON.parse(saved);}
  var sid=localStorage.getItem('lp_stock2_nextid');
  if(sid){nextId=parseInt(sid);}
}catch(e){}

function statusColor(s){if(s==='available')return '#6ab87a';if(s==='low')return '#d4a96a';return '#c0504a';}
function iconForName(name){
  var n=name.toLowerCase();
  if(n.indexOf('poulet')>=0||n.indexOf('chicken')>=0)return '&#x1F357;';
  if(n.indexOf('agneau')>=0||n.indexOf('lamb')>=0||n.indexOf('cote')>=0)return '&#x1F356;';
  if(n.indexOf('merguez')>=0||n.indexOf('kefta')>=0||n.indexOf('saucisse')>=0)return '&#x1F525;';
  if(n.indexOf('brochette')>=0)return '&#x1F362;';
  if(n.indexOf('marine')>=0||n.indexOf('chawarma')>=0)return '&#x1F32F;';
  return '&#x1F969;';
}

function addProduct(){
  try{
    var nameEl=document.getElementById('newName');
    var noteEl=document.getElementById('newNote');
    var statusEl=document.getElementById('newStatus');
    var name=nameEl.value.trim();
    if(!name){showToast('Entrez un nom de produit');return;}
    var note=noteEl.value.trim()||'Bonne quantite';
    var status=statusEl.value;
    var icon=iconForName(name);
    stock.push({id:nextId,name:name,icon:icon,status:status,note:note});
    nextId++;
    nameEl.value='';
    noteEl.value='';
    statusEl.value='available';
    renderAdmin();
    showToast('Produit ajoute — pensez a enregistrer');
  }catch(e){console.log('addProduct error:',e);}
}

function deleteProduct(id){
  try{
    stock=stock.filter(function(p){return p.id!==id;});
    renderAdmin();
    showToast('Produit supprime — pensez a enregistrer');
  }catch(e){}
}

function renderAdmin(){
  try{
    var grid=document.getElementById('adminGrid');
    if(!grid)return;
    var html='';
    for(var i=0;i<stock.length;i++){
      var p=stock[i];
      html+='<div class="admin-card">'+
        '<span class="admin-icon">'+p.icon+'</span>'+
        '<div class="admin-info">'+
          '<div class="admin-name">'+p.name+'</div>'+
          '<div class="admin-controls">'+
            '<select class="status-select" id="s-'+p.id+'" onchange="updateInd('+p.id+')">'+
              '<option value="available"'+(p.status==='available'?' selected':'')+'>Disponible</option>'+
              '<option value="low"'+(p.status==='low'?' selected':'')+'>Stock limite</option>'+
              '<option value="out"'+(p.status==='out'?' selected':'')+'>Epuise</option>'+
            '</select>'+
            '<input class="note-input" id="n-'+p.id+'" type="text" value="'+p.note+'" placeholder="Note"/>'+
          '</div>'+
        '</div>'+
        '<div class="status-ind" id="ind-'+p.id+'" style="background-color:'+statusColor(p.status)+'"></div>'+
        '<button class="delete-btn" onclick="deleteProduct('+p.id+')" title="Supprimer">&#x2715;</button>'+
        '</div>';
    }
    grid.innerHTML=html;
    updateSummary();
  }catch(e){console.log('renderAdmin error:',e);}
}

function updateInd(id){
  try{
    var v=document.getElementById('s-'+id).value;
    document.getElementById('ind-'+id).style.backgroundColor=statusColor(v);
    updateSummary();
  }catch(e){}
}

function updateSummary(){
  try{
    var c={available:0,low:0,out:0};
    for(var i=0;i<stock.length;i++){
      var el=document.getElementById('s-'+stock[i].id);
      var v=el?el.value:stock[i].status;
      if(c[v]!==undefined)c[v]++;
    }
    document.getElementById('summary').innerHTML=
      '<div class="summary-item"><div class="s-dot" style="background-color:#6ab87a"></div>'+c.available+' dispo</div>'+
      '<div class="summary-item"><div class="s-dot" style="background-color:#d4a96a"></div>'+c.low+' limite</div>'+
      '<div class="summary-item"><div class="s-dot" style="background-color:#c0504a"></div>'+c.out+' epuise</div>';
  }catch(e){}
}

function saveStock(){
  try{
    for(var i=0;i<stock.length;i++){
      var s=document.getElementById('s-'+stock[i].id);
      var n=document.getElementById('n-'+stock[i].id);
      if(s)stock[i].status=s.value;
      if(n)stock[i].note=n.value;
    }
    localStorage.setItem('lp_stock2',JSON.stringify(stock));
    localStorage.setItem('lp_stock2_nextid',String(nextId));
    var now=new Date();
    var timeStr=now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    try{localStorage.setItem('lp_stock2_time',timeStr);}catch(e){}
    document.getElementById('lastSaved').textContent='Sauvegarde a '+timeStr;
    showToast('Stock mis a jour sur le site');
  }catch(e){console.log('saveStock error:',e);}
}

function setAll(status){
  for(var i=0;i<stock.length;i++){
    var el=document.getElementById('s-'+stock[i].id);
    if(el){el.value=status;updateInd(stock[i].id);}
  }
}

function showToast(msg){
  try{
    var t=document.getElementById('toast');
    t.textContent=msg;t.classList.add('show');
    setTimeout(function(){t.classList.remove('show');},2500);
  }catch(e){}
}

document.addEventListener('keydown',function(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveStock();}
});

// Allow pressing Enter in the name field to add product
document.addEventListener('DOMContentLoaded',function(){
  var nameEl=document.getElementById('newName');
  if(nameEl){
    nameEl.addEventListener('keydown',function(e){
      if(e.key==='Enter')addProduct();
    });
  }
});

renderAdmin();
</script>

</body>
</html>
